name: 更新飞书退货率数据

on:
  schedule:
    # 每天 18:00 Asia/Shanghai = UTC 10:00
    - cron: '0 10 * * *'
  workflow_dispatch:   # 也支持手动触发（GitHub 网页上点 Run workflow）

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install openpyxl

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: 更新飞书数据并部署
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          python3 update_feishu_rates.py --yes
